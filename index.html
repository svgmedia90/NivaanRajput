<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nivaan Rajput</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:white;
}

/* Animated Background Glow */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background: radial-gradient(circle, rgba(0,255,255,0.15), transparent);
  animation: move 6s infinite alternate;
}

@keyframes move{
  0%{transform:translate(-100px,-100px);}
  100%{transform:translate(100px,100px);}
}

/* Card */
.container{
  text-align:center;
  padding:40px 30px;
  width:90%;
  max-width:400px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 40px rgba(0,255,255,0.15);
  animation: fadeIn 1.2s ease;
}

/* Logo */
.logo{
  width:120px;
  margin-bottom:20px;
  filter: drop-shadow(0 0 15px cyan);
}

/* Title */
.title{
  font-size:24px;
  font-weight:600;
  margin-bottom:10px;
  letter-spacing:1px;
}

/* Subtitle */
.subtitle{
  font-size:14px;
  opacity:0.7;
  margin-bottom:30px;
}

/* Button */
.btn{
  display:inline-block;
  padding:14px 30px;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
  color:white;
  background: linear-gradient(135deg, #00f5ff, #0066ff);
  box-shadow: 0 0 20px rgba(0,255,255,0.6);
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow: 0 0 30px rgba(0,255,255,1);
}

/* Animation */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Footer */
.footer{
  margin-top:25px;
  font-size:12px;
  opacity:0.5;
}

</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" alt="logo" class="logo">

  <!-- TITLE -->
  <div class="title">Nɪᴠᴀᴀɴ Rᴀᴊᴘᴜᴛ</div>

  <!-- SUBTITLE -->
  <div class="subtitle">
    🔥 Premium Cricket Predictions <br>
    💰 100% Match Analysis & Tips
  </div>

  <!-- BUTTON -->
  <a href="https://t.me/+ByZcfhUOlJJjMWE9" class="btn">
    Join Telegram
  </a>

  <!-- FOOTER -->
  <div class="footer">
    Trusted by Pro Players 🚀
  </div>

</div>

</body>
</html>
